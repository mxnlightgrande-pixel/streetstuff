<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Route Planner</title>

  <!-- SheetJS -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

  <style>

    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      color: #6561A8;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: #6561A8;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 12px;
      margin-top: 10px;
    }

  </style>

</head>

<body>

  <h1>Good in the Hood Route Planner</h1>

  <input
    type="file"
    id="excelFile"
    accept=".xlsx,.xls,.csv"
  >

  <br>

  <button onclick="generateRoute()">
    Generate Route
  </button>

  <div id="results"></div>

  <script>

    async function generateRoute() {

      try {

        const fileInput =
          document.getElementById("excelFile");

        if (!fileInput.files.length) {

          alert("Please upload an Excel file.");

          return;
        }

        const file = fileInput.files[0];

        const data = await file.arrayBuffer();

        const workbook = XLSX.read(data);

        const sheet =
          workbook.Sheets[workbook.SheetNames[0]];

        const rows =
          XLSX.utils.sheet_to_json(sheet);

        console.log(rows);

        let googleMapsURL =
          "https://www.google.com/maps/dir/";

        let output = "";

        for (const row of rows) {

          const address =
            row.address ||
            row.Address ||
            row.ADDRESS;

          const suburb =
            row.suburb ||
            row.Suburb ||
            row.SUBURB;

          const group =
            row.delivery_group ||
            row.delivery_group_ ||
            row["Delivery Group"] ||
            "No Group";

          if (!address || !suburb) {

            console.log("Missing row:", row);

            continue;
          }

          const fullAddress =
            `${address}, ${suburb}, NSW Australia`;

          googleMapsURL +=
            encodeURIComponent(fullAddress) + "/";

          output += `
            <div class="card">
              <strong>${group}</strong>
              <br>
              ${fullAddress}
            </div>
          `;
        }

        output += `
          <button
            onclick="window.open('${googleMapsURL}', '_blank')"
          >
            Open Route in Google Maps
          </button>
        `;

        document.getElementById(
          "results"
        ).innerHTML = output;

      }

      catch(error) {

        console.error(error);

        alert(
          "Error. Press F12 then Console."
        );
      }
    }

  </script>

</body>

</html>
