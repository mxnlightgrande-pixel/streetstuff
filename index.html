<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Delivery Route Planner</title>

  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

  <style>

    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      color: #6561A8;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: #6561A8;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    .groupCard {
      background: white;
      padding: 16px;
      border-radius: 16px;
      margin-top: 20px;
    }

    .address {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

  </style>

</head>

<body>

  <h1>Good in the Hood Route Planner</h1>

  <input
    type="file"
    id="excelFile"
    accept=".xlsx,.xls,.csv"
  >

  <br>

  <button onclick="generateRoutes()">
    Generate Routes
  </button>

  <div id="results"></div>

  <script>

    async function generateRoutes() {

      try {

        const fileInput =
          document.getElementById("excelFile");

        if (!fileInput.files.length) {

          alert("Upload an Excel file first.");

          return;
        }

        const file = fileInput.files[0];

        const data = await file.arrayBuffer();

        const workbook = XLSX.read(data);

        const sheet =
          workbook.Sheets[workbook.SheetNames[0]];

        const rows =
          XLSX.utils.sheet_to_json(sheet);

        console.log(rows);

        // Store groups
        const groups = {};

        for (const row of rows) {

          const deliveryGroup =
            row.delivery_group ||
            row.delivery_group_ ||
            row["Delivery Group"] ||
            "Ungrouped";

          const address =
            row.address ||
            row.Address ||
            row.ADDRESS;

          const suburb =
            row.suburb ||
            row.Suburb ||
            row.SUBURB;

          if (!address || !suburb)
            continue;

          const fullAddress =
            `${address}, ${suburb}, NSW Australia`;

          // Create group if missing
          if (!groups[deliveryGroup]) {

            groups[deliveryGroup] = [];
          }

          groups[deliveryGroup]
            .push(fullAddress);
        }

        let output = "";

        // Create cards for each group
        for (const groupName in groups) {

          const addresses =
            groups[groupName];

          let googleMapsURL =
            "https://www.google.com/maps/dir/";

          let addressHTML = "";

          addresses.forEach(address => {

            googleMapsURL +=
              encodeURIComponent(address) + "/";

            addressHTML += `
              <div class="address">
                ${address}
              </div>
            `;
          });

          output += `
            <div class="groupCard">

              <h2>${groupName}</h2>

              ${addressHTML}

              <button
                onclick="window.open('${googleMapsURL}', '_blank')"
              >
                Open ${groupName} Route
              </button>

            </div>
          `;
        }

        document.getElementById(
          "results"
        ).innerHTML = output;

      }

      catch(error) {

        console.error(error);

        alert(
          "Something broke. Press F12 → Console."
        );
      }
    }

  </script>

</body>

</html>
